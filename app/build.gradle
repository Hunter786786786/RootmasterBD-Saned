plugins {
    id 'com.android.application'
}
android {
    namespace 'com.rootmasterbd.saned'
    compileSdk 34
    defaultConfig {
        applicationId "com.rootmasterbd.saned"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
