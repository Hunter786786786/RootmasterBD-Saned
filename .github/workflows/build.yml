name: Build RootmasterBD Saned
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Build APK
        run: |
          # Install Android SDK
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

          # Install Gradle
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH=$PWD/gradle-8.5/bin:$PATH

          # Generate wrapper
          gradle wrapper

          # Build
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Package module
        run: |
          mkdir -p out
          [ -d module ] && cp -r module/. out/
          find . -name "app-debug.apk" -exec cp {} out/RootmasterBD_Saned.apk \;
          cd out && zip -r ../RootmasterBD_Saned_Module.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: RootmasterBD-Saned-Module
          path: RootmasterBD_Saned_Module.zip

      - name: Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          files: RootmasterBD_Saned_Module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
