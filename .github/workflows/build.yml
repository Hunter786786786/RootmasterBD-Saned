name: Build RootmasterBD Saned
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5 --distribution-type bin
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -50

      - name: Package
        if: always()
        run: |
          mkdir -p out
          [ -d module ] && cp -r module/. out/ || true
          find . -name "*.apk" -exec cp {} out/RootmasterBD_Saned.apk \; 2>/dev/null || true
          ls -la out/
          cd out && zip -r ../RootmasterBD_Saned_Module.zip . && cd ..

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RootmasterBD-Saned
          path: RootmasterBD_Saned_Module.zip

      - name: Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          files: RootmasterBD_Saned_Module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
