name: Build RootmasterBD Saned
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install Android SDK & Build Tools
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH=$PWD/gradle-8.5/bin:$PATH
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH
          gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Bundle module zip
        run: |
          mkdir -p module_out
          [ -d "module" ] && cp -r module/. module_out/
          APK=$(find . -name "app-debug.apk" 2>/dev/null | head -1)
          [ -n "$APK" ] && cp "$APK" module_out/RootmasterBD_Saned.apk || echo "APK not found"
          cd module_out && zip -r ../RootmasterBD_Saned_Module.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: RootmasterBD-Saned-Module
          path: RootmasterBD_Saned_Module.zip

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: RootmasterBD Saned v1.0.${{ github.run_number }}
          files: RootmasterBD_Saned_Module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
